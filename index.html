<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cupcake house</title>

    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://unpkg.com/swiper@8/swiper-bundle.min.css"/>

    <!-- Boxicons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="logo">Cupcake house</div>

        <div class="icon-cart">
            <img src="img/cart_icon.jpg" alt="cart">
        </div>
    </header>

    <main>
        <div class="title">
            <h3>Enjoy tasty cupcakes</h3>
            <img src="img/cupcake_anime.gif" alt="Cupcake">
        </div>
    </main>

    <!-- Trending slider -->
    <section id="trending">
        <div class="swiper tranding-slider">
            <div class="swiper-wrapper">

                <div class="swiper-slide trending-slide">
                    <div class="trending-slide-img">
                        <img src="img/pink_cupcake.jpg" alt="Pink cupcake">
                    </div>
                </div>

                <div class="swiper-slide trending-slide">
                    <div class="trending-slide-img">
                        <img src="img/blue_cupcake.jpg" alt="Blue cupcake">
                    </div>
                </div>

                <div class="swiper-slide trending-slide">
                    <div class="trending-slide-img">
                        <img src="img/purple_cupcake.jpg" alt="Purple cupcake">
                    </div>
                </div>

                 <div class="swiper-slide trending-slide">
                    <div class="trending-slide-img">
                        <img src="img/yellow_cupcake.jpg" alt="White cupcake">
                    </div>
                </div>
                
                <div class="swiper-slide trending-slide">
                    <div class="trending-slide-img">
                        <img src="img/red_cupcake.jpg" alt="Red cupcake">
                    </div>
                </div>

                <div class="swiper-slide trending-slide">
                    <div class="trending-slide-img">
                        <img src="img/white_cupcake.jpg" alt="White cupcake">
                    </div>
                </div>


                <div class="swiper-slide trending-slide">
                    <div class="trending-slide-img">
                        <img src="img/choc_cupcake.jpg" alt="Chocolate cupcake">
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- Social icons -->
    <div class="networks">
        <i class="bx bxl-instagram"></i>
        <i class="bx bxl-tiktok"></i>
        <i class="bx bxl-facebook"></i>
        <i class="bx bxl-youtube"></i>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/swiper@8/swiper-bundle.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
